name: Check Creative Winners

on:
  schedule:
    # 9:00 AM Vietnam (2:00 UTC)
    - cron: '0 2 * * *'
    # 2:00 PM Vietnam (7:00 UTC)
    - cron: '0 7 * * *'
    # 5:00 PM Vietnam (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-winners:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new winners
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "https://creative-testing-dashboard-sandy.vercel.app/api/cron/check-winners?secret=${{ secrets.CRON_SECRET }}")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          
          echo "Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "::warning::API returned $http_code"
            exit 1
          fi
